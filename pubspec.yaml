name: expense_flow
description: "Personal finance and expense tracking application built with Flutter."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons:
    ^1.0.8

    # State Management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Navigation
  go_router: ^13.2.4

  # Networking
  dio: ^5.4.3+1
  connectivity_plus: ^6.0.3

  # Local Database
  isar_community: ^3.3.2
  isar_community_flutter_libs: ^3.3.2
  path_provider: ^2.1.0

  # Secure Storage
  flutter_secure_storage: ^9.2.2

  # UI
  flutter_animate: ^4.5.0
  lottie: ^3.1.0
  shimmer: ^3.0.0
  fl_chart: ^0.68.0
  google_fonts: ^6.2.1
  gap: ^3.0.1
  animations: ^2.0.11

  # Utils
  intl: ^0.19.0
  uuid: ^4.4.0

  # JSON Serialization
  json_annotation: ^4.9.0
  freezed_annotation: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  isar_community_generator: ^3.3.2
  riverpod_generator: ^4.0.3
  freezed: ^3.2.5
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
